---
- name: Remove enterprise repos
  ansible.builtin.deb822_repository:
    name: "{{ item }}"
    state: absent
  loop:
    - pve-enterprise
    - ceph

- name: Add no-subscription repos
  ansible.builtin.deb822_repository:
    name: "{{ item.name }}"
    uris: "{{ item.uris }}"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: "{{ item.components }}"
    signed_by: /usr/share/keyrings/proxmox-archive-keyring.gpg
    state: present
  loop:
    - name: pve-no-subscription
      uris: [ http://download.proxmox.com/debian/pve ]
      components: [ pve-no-subscription ]
    - name: ceph-no-subscription
      uris: [ http://download.proxmox.com/debian/ceph-squid ]
      components: [ no-subscription ]

- name: Upgrade all packages
  ansible.builtin.apt:
    update_cache: yes
    upgrade: yes
    cache_valid_time: 3600

- name: Remove "no valid subscription" popup
  ansible.builtin.replace:
    path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
    regexp: '{{ item.regexp }}'
    replace: '{{ item.replace }}'
  loop:
    - regexp: '^.+data\.status.+\!== ''active'''
      replace: false
  notify: Restart pveproxy