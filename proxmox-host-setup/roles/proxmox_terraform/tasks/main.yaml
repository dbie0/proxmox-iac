---
- name: List users
  ansible.builtin.command: pveum user list
  register: proxmox_terraform_pveum_users
  changed_when: false

- name: Create Terraform user
  ansible.builtin.command: >
    pveum user add {{ proxmox_terraform_username }}
  when: proxmox_terraform_username not in proxmox_terraform_pveum_users.stdout
  changed_when: true

- name: List roles
  ansible.builtin.command: pveum role list
  register: proxmox_terraform_pveum_roles
  changed_when: false

- name: Create Terraform role
  ansible.builtin.command: >
    pveum role add {{ proxmox_terraform_role_name }}
    -privs "{{ proxmox_terraform_pve_terraform_privs | join(' ') }}"
  when: proxmox_terraform_role_name not in proxmox_terraform_pveum_roles.stdout
  changed_when: true

- name: List ACLs
  ansible.builtin.command: pveum acl list --output-format json
  register: proxmox_terraform_pveum_acls
  changed_when: false

- name: Assign Terraform role to Terraform user
  ansible.builtin.command: >
    pveum acl modify / -roles {{ proxmox_terraform_role_name }} -users {{ proxmox_terraform_username }}
  when: >
    proxmox_terraform_username not in (
      proxmox_terraform_pveum_acls.stdout | default('[]')
      | from_json
      | selectattr('roleid', 'equalto', proxmox_terraform_role_name)
      | map(attribute='ugid')
      | list
    )
  changed_when: true

- name: Check if terraform token exists for user
  ansible.builtin.command: >
    pveum user token list {{ proxmox_terraform_username }}
  register: proxmox_terraform_pveum_tokens
  changed_when: false

- name: Create Proxmox API token via CLI
  ansible.builtin.command: >
    pveum user token add {{ proxmox_terraform_username }} {{ proxmox_terraform_token_name }} --privsep 1 --output-format json
  register: proxmox_terraform_token_creation_result
  when: proxmox_terraform_token_name not in proxmox_terraform_pveum_tokens.stdout
  changed_when: true

- name: Template token into Terraform auto.tfvars
  # noqa: no-handler
  ansible.builtin.copy:
    dest: "../terraform/secrets.auto.tfvars"
    mode: '0600'
    content: |
      proxmox_api_token = "{{ proxmox_terraform_username }}!" +
                          "{{ proxmox_terraform_token_name }}=" +
                          "{{ (proxmox_terraform_token_creation_result.stdout | from_json).value }}"
      proxmox_api_url = "https://{{ inventory_hostname }}:8006/"
  delegate_to: localhost
  when: proxmox_terraform_token_creation_result.changed

- name: Check if snippets storage exists
  ansible.builtin.command: "grep -A 5 'dir: {{ proxmox_terraform_snippet_storage }}' /etc/pve/storage.cfg"
  register: proxmox_terraform_storage_config
  changed_when: false

- name: Enable snippet storage for cloud-init files
  ansible.builtin.command: "pvesm set {{ proxmox_terraform_snippet_storage }} --content {{ proxmox_terraform_snippet_storage_content }}"
  when: "'snippets' not in proxmox_terraform_storage_config.stdout"
  changed_when: true
