---
pve_nic_name: "nic0"

# VLAN Definitions
pve_vlan_trusted: 411
pve_vlan_untrusted: 300

# Main Trusted Network
pve_trusted_ip: "10.0.0.15/16"
pve_trusted_gw: "10.0.0.1"

# Separated VM Network (IaC)
pve_sep_ip: "10.0.101.1/16"

# dnsmasq Configuration
pve_dnsmasq_domain: "pve.lol"
pve_dnsmasq_range: "10.0.101.2,10.0.101.255,255.255.0.0,2h"
pve_dnsmasq_router: "10.0.0.1"
pve_dnsmasq_dns: "10.0.0.5" # upstream DNS